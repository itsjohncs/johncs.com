<!DOCTYPE html>
<html>
<head>
<title>{{.Title}} - johncs.com</title>
<meta charset="utf-8">
<!-- TODO: these are free fonts, can host them myself and avoid contributing
  -- to google's privacy nightmare. -->
<link href="https://fonts.googleapis.com/css?family=Chivo:700,900" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Merriweather:400,700,900" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Source+Code+Pro:400" rel="stylesheet">
<link rel="shortcut icon" href="me.jpg" type="image/x-icon">
<meta name="description" content="{{.Description}}">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta property="og:description" content="{{.Summary}}" />
<meta property="og:image" content="{{ .Params.cover_image | default "http://johncs.com/me.jpg" }}" />

{{ $normalize := resources.Get "normalize.css" | resources.Minify }}
<link rel="stylesheet" href="{{ $normalize.RelPermalink }}">

{{ $articleCss := resources.Get "article.css" |
    resources.PostCSS |
    resources.Minify }}
<link href="{{ $articleCss.RelPermalink }}" rel="stylesheet">
</head>
<body>
<header>
    <nav>
        <a href="/blog">johncs|blog</a>
        <button id="color-scheme-toggle">
            <svg class="moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="currentColor" d="M332.2 426.4c-93.1 17.7-178.5-53.7-178.5-147.7 0-54.2 29-104 76.1-130.8 7.3-4.1 5.4-15.1-2.8-16.7C108.7 109.4 0 200 0 320c0 106 85.8 192 191.8 192 59.2 0 113.2-26.9 149-71.1 5.3-6.5-.5-16.1-8.6-14.5zM304 96l16-32 32-16-32-16-16-32-16 32-32 16 32 16 16 32zm154.7 85.3L432 128l-26.7 53.3L352 208l53.3 26.7L432 288l26.7-53.3L512 208l-53.3-26.7z"/></svg>
            <svg class="sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="currentColor" d="M256 160c-52.9 0-96 43.1-96 96s43.1 96 96 96 96-43.1 96-96-43.1-96-96-96zm246.4 80.5l-94.7-47.3 33.5-100.4c4.5-13.6-8.4-26.5-21.9-21.9l-100.4 33.5-47.4-94.8c-6.4-12.8-24.6-12.8-31 0l-47.3 94.7L92.7 70.8c-13.6-4.5-26.5 8.4-21.9 21.9l33.5 100.4-94.7 47.4c-12.8 6.4-12.8 24.6 0 31l94.7 47.3-33.5 100.5c-4.5 13.6 8.4 26.5 21.9 21.9l100.4-33.5 47.3 94.7c6.4 12.8 24.6 12.8 31 0l47.3-94.7 100.4 33.5c13.6 4.5 26.5-8.4 21.9-21.9l-33.5-100.4 94.7-47.3c13-6.5 13-24.7.2-31.1zm-155.9 106c-49.9 49.9-131.1 49.9-181 0-49.9-49.9-49.9-131.1 0-181 49.9-49.9 131.1-49.9 181 0 49.9 49.9 49.9 131.1 0 181z"/></svg>
        </button>
    </nav>
    <div class="post-title-container">
        <h1>
            <time tabindex="0" datetime="{{ .Date.Format "2006-01-02"}}">{{ .Date.Format "JAN.2.2006" }}</time><br>
            {{ .Title }}
        </h1>
    </div>
</header>
<article>
    {{.Content}}
</article>
{{ $articleJs := resources.Get "article.js" }}
<script async src="{{ $articleJs.RelPermalink }}"></script>
</body>
</html>
